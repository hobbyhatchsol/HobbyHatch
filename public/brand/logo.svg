<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="HobbyHatch">
  <defs>
    <linearGradient id="holo" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#7FE7D9"/>
      <stop offset="0.35" stop-color="#8FD3F4"/>
      <stop offset="0.7" stop-color="#B7A6F3"/>
      <stop offset="1" stop-color="#FCE38A"/>
    </linearGradient>
    <linearGradient id="egg" x1="180" y1="150" x2="330" y2="410" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FBFBF4"/>
      <stop offset="0.55" stop-color="#F3F7EC"/>
      <stop offset="1" stop-color="#D9EFDD"/>
    </linearGradient>
    <radialGradient id="eggGlow" cx="0.42" cy="0.36" r="0.7">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="hexClip">
      <path d="M466 256 361 438 151 438 46 256 151 74 361 74Z"/>
    </clipPath>
  </defs>

  <!-- Badge background -->
  <g clip-path="url(#hexClip)">
    <path d="M466 256 361 438 151 438 46 256 151 74 361 74Z" fill="#12141C"/>
    <path d="M466 256 361 438 151 438 46 256 151 74 361 74Z" fill="url(#holo)" opacity="0.06"/>
    <!-- circuit traces -->
    <g stroke="url(#holo)" stroke-width="3" fill="none" opacity="0.85" stroke-linecap="round">
      <path d="M70 300 L120 300 L150 330 L210 330"/>
      <path d="M96 350 L150 350 L172 372 L250 372"/>
      <path d="M442 300 L392 300 L362 330 L302 330"/>
      <path d="M416 350 L362 350 L340 372 L262 372"/>
      <path d="M256 400 L256 372"/>
    </g>
    <g fill="url(#holo)">
      <circle cx="210" cy="330" r="5"/>
      <circle cx="302" cy="330" r="5"/>
      <circle cx="250" cy="372" r="4"/>
      <circle cx="262" cy="372" r="4"/>
      <circle cx="256" cy="400" r="5"/>
      <circle cx="70" cy="300" r="4"/>
      <circle cx="442" cy="300" r="4"/>
    </g>
  </g>

  <!-- Hexagon holographic frame -->
  <path d="M466 256 361 438 151 438 46 256 151 74 361 74Z" fill="none" stroke="url(#holo)" stroke-width="10" stroke-linejoin="round"/>
  <path d="M466 256 361 438 151 438 46 256 151 74 361 74Z" fill="none" stroke="#ffffff" stroke-opacity="0.25" stroke-width="2" stroke-linejoin="round"/>

  <!-- Sparkles -->
  <g fill="#FCE38A">
    <path d="M168 150 q6 14 20 20 q-14 6 -20 20 q-6 -14 -20 -20 q14 -6 20 -20Z"/>
    <path d="M338 196 q4 9 13 13 q-9 4 -13 13 q-4 -9 -13 -13 q9 -4 13 -13Z" opacity="0.9"/>
  </g>

  <!-- Egg -->
  <g>
    <!-- lower shell -->
    <path d="M198 268 C198 224 224 196 256 196 C288 196 314 224 314 268 C314 322 289 356 256 356 C223 356 198 322 198 268Z" fill="url(#egg)" stroke="#C9DFCC" stroke-width="2"/>
    <!-- crack line -->
    <path d="M198 262 L214 250 L226 262 L240 248 L254 262 L268 248 L282 262 L296 250 L314 262"
          fill="none" stroke="#12141C" stroke-width="6" stroke-linejoin="round" stroke-linecap="round"/>
    <!-- cracked cap -->
    <path d="M206 250 C206 218 228 198 256 198 C284 198 306 218 306 250 L296 250 L282 262 L268 248 L254 262 L240 248 L226 262 L214 250Z"
          fill="url(#egg)" stroke="#C9DFCC" stroke-width="2"/>
    <ellipse cx="230" cy="240" rx="46" ry="34" fill="url(#eggGlow)"/>

    <!-- face -->
    <g fill="#12141C">
      <ellipse cx="238" cy="292" rx="8.5" ry="11"/>
      <ellipse cx="278" cy="292" rx="8.5" ry="11"/>
      <path d="M244 312 C250 328 268 328 274 312 C270 322 248 322 244 312Z"/>
    </g>
    <circle cx="241" cy="288" r="2.6" fill="#fff"/>
    <circle cx="281" cy="288" r="2.6" fill="#fff"/>
    <!-- cheeks -->
    <circle cx="224" cy="306" r="6" fill="#FBC4B5" opacity="0.7"/>
    <circle cx="292" cy="306" r="6" fill="#FBC4B5" opacity="0.7"/>
    <!-- speckles -->
    <g fill="#CBB89B" opacity="0.55">
      <circle cx="300" cy="300" r="3"/>
      <circle cx="292" cy="330" r="2.4"/>
      <circle cx="214" cy="322" r="2.2"/>
    </g>
  </g>
</svg>
